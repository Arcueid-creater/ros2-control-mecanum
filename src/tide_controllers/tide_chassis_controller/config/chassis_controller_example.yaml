# Example configuration for chassis controller
# Add this to your robot's configuration file

controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    # Add chassis_controller to the controller list
    chassis_controller:
      type: "tide_chassis_controller/TideChassisController"

# Chassis controller parameters
chassis_controller:
  ros__parameters:
    # Wheel joint names (adjust according to your robot)
    wheel_joints:
      - "front_left_wheel_joint"
      - "front_right_wheel_joint"
      - "rear_left_wheel_joint"
      - "rear_right_wheel_joint"
    
    # Robot dimensions
    wheel_radius: 0.076        # meters
    wheel_base: 0.4            # meters (front to rear)
    wheel_track: 0.4           # meters (left to right)
    
    # Velocity limits
    max_linear_velocity: 3.0   # m/s
    max_angular_velocity: 3.0  # rad/s
    
    # Enable odometry
    enable_odom: true
